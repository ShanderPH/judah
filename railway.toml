# Railway deployment configuration — https://docs.railway.app/reference/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Runs once per new deploy, before the new instance accepts traffic.
# Migrations run here so the DB schema is ready when the app starts.
releaseCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput --clear"

# Railway pings this path to determine if the container is healthy.
# Must return 2xx for the deploy to be marked successful.
healthcheckPath = "/api/v1/health/"
healthcheckTimeout = 300

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
